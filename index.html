/* FM2026 - Main Styles */
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a141f;font-family:Arial,sans-serif;}

#map{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1;background:#0a141f;}

#hud{
  position:fixed;top:0;left:0;right:0;z-index:50;height:52px;
  background:rgba(10,20,35,0.92);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(0,212,255,0.15);
  padding:8px 12px;display:flex;align-items:center;
}

#msg{
  position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-80px);
  z-index:500;background:rgba(10,20,35,0.95);
  border:1px solid rgba(0,212,255,0.3);border-radius:12px;
  padding:10px 18px;font-size:13px;font-weight:600;color:#e0f0ff;
  transition:transform .3s;pointer-events:none;
  max-width:90vw;text-align:center;
}

#panel{
  position:fixed;left:0;right:0;bottom:62px;height:55vh;
  background:#0a141f;
  border-top:1px solid rgba(0,212,255,0.25);
  border-radius:16px 16px 0 0;
  z-index:90;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}

#panel-body{overflow-y:auto;padding:12px 14px;flex:1;}

#modal{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.75);
  display:none;align-items:center;justify-content:center;
}
#modal-body{
  background:#0a141f;border:1px solid rgba(0,212,255,0.3);
  border-radius:16px;padding:22px;
  width:92vw;max-width:400px;max-height:80vh;
  overflow-y:auto;color:#e0f0ff;
}

#navbar{
  position:fixed;bottom:0;left:0;right:0;height:62px;
  background:rgba(10,20,35,0.97);
  border-top:1px solid rgba(0,212,255,0.2);
  display:flex;align-items:stretch;z-index:100;
}
#navbar button{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  background:none;border:none;cursor:pointer;
  border-top:2.5px solid transparent;
  color:#4a6070;font-family:Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
  transition:color .2s,border-color .2s;
}
#navbar button.active-tab{color:#00d4ff;border-top-color:#00d4ff;}
#navbar button span{font-size:9px;font-weight:700;letter-spacing:1px;}

.hud-btn{
  width:36px;height:36px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:9px;display:flex;
  align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:background .15s;
}
.hud-btn:hover{background:rgba(255,255,255,0.1);}

.flight-path{stroke-dasharray:10,8;animation:dash 20s linear infinite;}
@keyframes dash{to{stroke-dashoffset:-500;}}

/* Panel tabs */
.sub-tab-btn{
  padding:6px 14px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);border-radius:8px;
  font-size:11px;font-weight:700;color:#5580a0;
  cursor:pointer;font-family:Arial,sans-serif;
  transition:all .15s;
}
.sub-tab-btn.active{background:rgba(0,212,255,0.15);color:#00d4ff;border-color:rgba(0,212,255,0.3);}

/* Cards */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;padding:12px;margin-bottom:8px;
}
.card:active{background:rgba(255,255,255,0.07);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.3);border-radius:2px;}

</style>

<div id="hud">
